name: deploy to VPS
on: workflow_dispatch
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repo'
        uses: actions/checkout@v4
      - name: 'Login to DockerHub registry'
        uses: docker/login-action@v4
        with: 
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 'Build API image'
        run: docker build -t ${{ secrets.DOCKER_LOGIN }}/ds-api:latest ./server
      - name: 'Build Client image'
        run: docker build -t ${{ secrets.DOCKER_LOGIN }}/ds-client:latest .
      - name: 'Push API image'
        run: docker push ${{ secrets.DOCKER_LOGIN }}/ds-api:latest
      - name: 'Push Client image'
        run: docker push ${{ secrets.DOCKER_LOGIN }}/ds-client:latest
        
  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_LOGIN }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: whoami
