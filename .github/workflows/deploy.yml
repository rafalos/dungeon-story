name: deploy to VPS
on:
  push:
    branches:
      - master
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repo'
        uses: actions/checkout@v4
      - name: 'Login to DockerHub registry'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API image
        run: |
          docker build -t ${{ secrets.DOCKER_LOGIN }}/ds-api:latest \
                       -t ${{ secrets.DOCKER_LOGIN }}/ds-api:sha-${{ github.sha }} ./server

      - name: Build Client image
        run: |
          docker build -t ${{ secrets.DOCKER_LOGIN }}/ds-client:latest \
                       -t ${{ secrets.DOCKER_LOGIN }}/ds-client:sha-${{ github.sha }} .

      - name: Push API image
        run: |
          docker push ${{ secrets.DOCKER_LOGIN }}/ds-api:latest
          docker push ${{ secrets.DOCKER_LOGIN }}/ds-api:sha-${{ github.sha }}

      - name: Push Client image
        run: |
          docker push ${{ secrets.DOCKER_LOGIN }}/ds-client:latest
          docker push ${{ secrets.DOCKER_LOGIN }}/ds-client:sha-${{ github.sha }}
        
  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_LOGIN: ${{ secrets.DOCKER_LOGIN }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_LOGIN }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCKER_LOGIN,DOCKER_PASSWORD
          script: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_LOGIN" --password-stdin
            cd apps/dungeon-story/
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
            docker images | grep ds-
