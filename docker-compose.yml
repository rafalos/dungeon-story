services:
  mongo:
    image: mongo
    restart: always
    container_name: ds-database
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: development
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: ds-mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://dev:development@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: dev
      ME_CONFIG_BASICAUTH_PASSWORD: development

  api:
    build: 
      context: ./server
      target: development
    container_name: ds-api
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    container_name: ds-frontend
    env_file:
      - .env
    build:
      context: .
      target: development
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
volumes:
  mongo_data:
